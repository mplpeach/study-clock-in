server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/study_clock_in?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 文件存储配置
file:
  storage:
    type: local
    local:
      upload-dir: ${user.home}/study-clock-in/uploads
      access-prefix: /uploads
